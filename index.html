<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>kejutan</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:white;
}

#scare{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}

#scare img{
width:100%;
height:100%;
object-fit:cover;
}
</style>

</head>

<body>

<h1>Tunggu sebentar... ada kejutan 👀</h1>

<div id="scare">
<img src="https://i.imgur.com/3ZQ3Z6v.png">
<audio id="sound" src="https://www.soundjay.com/human/sounds/scream-01.mp3"></audio>
</div>

<script>

setTimeout(function(){

document.getElementById("scare").style.display="flex";
document.getElementById("sound").play();

},5000);

</script>

</body>
</html>
